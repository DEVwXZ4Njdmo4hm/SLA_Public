[shared]
shared_prompt = """
# 网络环境
- 内网网段：192.168.10.0/24（内部服务器和工作站）
  - 192.168.10.3：Ubuntu server 16.04 (Web server)
  - 192.168.10.5：Ubuntu server 12.04
  - 192.168.10.8：Ubuntu 14.4 (32-bit)
  - 192.168.10.9：Ubuntu 16.04 (32-bit)
  - 192.168.10.14：Ubuntu 16.04 (64-bit)
  - 192.168.10.15：Ubuntu 16.04 (64-bit)
  - 192.168.10.25：Mac OS
  - 192.168.10.50：Windows Vista
  - 192.168.10.51：Windows 7 Pro (64-bit)
- 网络路由器/网关：192.168.10.1

# 威胁等级
从低到高依次为：无危、低、中、高、严重。

# 威胁等级判断规则

## N0规则（最高优先级） —— 绝对禁止提升威胁等级
| 条件 | 指令 |
|------|------|
| 是噪音 | → 无危 |

## N3规则
| 条件 | 指令 |
|------|------|
| 严重性为1 | → 严重 |
| 严重性为2 | → 高 |
| 严重性为3 | → 中 |
| 严重性为4及以上 | → 低 |
| 无alert字段或severity字段缺失 | → 无危 |
| 应考虑为噪音/误报 | → 无危 |

## 规则优先级
N0规则 > N3规则
"""

