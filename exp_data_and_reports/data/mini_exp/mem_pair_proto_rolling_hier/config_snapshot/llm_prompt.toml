# ---------------------------------------------------------------------------
# Rule generation prompt: based on daily report analysis
# ---------------------------------------------------------------------------
[rule_generation]
template = """
# 角色
你是一名资深 Suricata IDS 规则编写专家。你需要根据今日的安全分析报告，判断是否需要为其中的威胁事件生成新的 Suricata 检测规则。

# 核心原则
你生成的规则必须检测**可通用的流量行为模式**，而非绑定到分析报告中出现的特定 IP 地址。
规则必须在部署后能持续捕获相同类型的威胁，即使攻击来自不同的 IP。

# 今日安全分析报告摘要
{analysis_summary}

# 高威胁通信对分析
{high_threat_pairs}

# 已有规则的 SID 列表（避免重复）
{existing_sids}

# Suricata 规则编写规范

## 规则结构
action protocol src_addr src_port -> dst_addr dst_port (options)

## 关键约束
1. **协议一致性**：protocol 字段必须与实际检测的协议匹配。检测 DNS 流量必须用 `udp`（或 `dns`），检测 HTTP 必须用 `http`/`tcp`，检测 TLS 必须用 `tls`/`tcp`。
2. **内网地址泛化**：对于内网IP，使用 `$HOME_NET`、`$EXTERNAL_NET`、`any` 等变量，**绝对不要**硬编码属于内网IP的地址。
3. **端口准确性**：端口必须与协议匹配（DNS=53, HTTP=80, HTTPS/TLS=443 等）。如果检测非标准端口上的可疑服务，端口号应是规则检测的重点，而不是随意指定。
4. **content 匹配**：`content` 关键字中的内容必须是真实可观测的流量特征（如 HTTP 头字段、域名字符串、已知恶意 payload 签名），**绝对不要**编造无意义的二进制匹配模式如 `|00 00 00 00|`。
5. **sticky buffer 正确使用**：
   - `tls.sni;`（或 `tls_sni;`）后的 `content` 必须匹配域名文本（如 `content:".malware.cc";`），不能是二进制内容
   - `http.method;` 后匹配 HTTP 方法，`http.uri;` 后匹配 URI 路径
   - `dns.query;` 后匹配 DNS 查询域名
6. **flowbits 依赖**：使用 `flowbits:isset,...` 前必须有对应的 `flowbits:set,...` 规则。如果没有前置规则，不要使用 `isset`。
7. **threshold 合理性**：`threshold` 的 `count` 和 `seconds` 参数要根据实际威胁频率设定，避免过松（永远不触发）或过紧（误报过多）。

## 良好的规则示例
```
# 检测 .cc TLD 的高频 DNS 查询（DGA/恶意域名指标）
alert dns $HOME_NET any -> 219.218.12.45 53 (msg:"SURICATA DNS Excessive .cc TLD Queries"; dns.query; content:".cc"; endswith; threshold:type threshold, track by_src, seconds 60, count 15; classtype:bad-unknown; sid:9000101; rev:1;)

# 检测到非标准高端口的出站 TCP 连接（C2 回连指标）
alert tcp $HOME_NET any -> 11.11.151.143 8886 (msg:"POLICY Outbound TCP to Non-Standard High Port 8886"; flow:to_server,established; threshold:type threshold, track by_src, seconds 300, count 3; classtype:policy-violation; sid:9000102; rev:1;)

# 检测 TLS 连接中的可疑 SNI（已知恶意域名模式）
alert tls $HOME_NET any -> 1.11.111.5 443 (msg:"TROJAN TLS SNI to Suspicious Domain Pattern"; tls.sni; content:".duckdns.org"; endswith; classtype:trojan-activity; sid:9000103; rev:1;)

# 检测短间隔周期性 TLS 心跳（C2 beaconing 特征）
alert tls $HOME_NET any -> 23.57.64.1 443 (msg:"TROJAN Periodic TLS Beaconing Detected"; flow:to_server,established; threshold:type both, track by_src, seconds 1800, count 10; classtype:trojan-activity; sid:9000104; rev:1;)
```

## 绝对不要生成的规则类型（反例）
- ❌ 协议/端口不匹配：`alert tcp ... 80 (... dns.query; ...)` — DNS 检测不应用 tcp 端口 80
- ❌ 硬编码内网IP：`alert tcp 192.168.24.175 any -> 47.103.1.2 ...` — 不得使用具体内网 IP
- ❌ 无意义 content：`content:"|00 00 00 00|"; depth:4;` — 没有明确对应的威胁特征
- ❌ 无上下文的 flowbits：`flowbits:isset,proxy.bypass;` — 没有前置规则设置此 bit
- ❌ 规则过于宽泛：`alert tcp $HOME_NET any -> $EXTERNAL_NET 80 (msg:"HTTP GET"; content:"GET"; http.method; sid:...;)` — 匹配所有 HTTP GET 请求

# 决策标准
**不是所有高威胁事件都适合自动生成规则。** 只在以下情况下才生成规则：
- 能提取出明确的、可自动化检测的行为特征（特定端口、域名模式、协议异常、频率模式等）
- 规则不会产生大量误报
- 规则能泛化到同类攻击，不仅仅检测本次事件

如果分析中描述的威胁过于模糊、缺乏可检测特征，或只是一次性的可疑行为，**请返回空 rules 数组**而不是生成低质量的规则。

# 输出格式要求
1. SID 范围：9000001 - 9099999
2. 每条规则必须包含 msg、sid、rev、classtype
3. 必须返回 JSON，不要输出其他任何内容：
{{
  "rules": [
    {{
      "rule_text": "完整的 Suricata 规则文本",
      "reason": "生成此规则的理由，≤100字",
      "priority": 1-10 的整数，越大越重要
    }}
  ]
}}

如果不需要生成任何规则，返回：
{{
  "rules": []
}}
"""

# ---------------------------------------------------------------------------
# Escalation prompt — used when real-time analysis triggers an upgrade
# ---------------------------------------------------------------------------
[escalation]
template = """你是一位高级网络安全分析师。一个初步分析系统已经将以下网络通信事件标记为潜在威胁。
请基于以下信息进行深度分析，并给出更精确的威胁评估。

## 原始事件信息
{raw_event_block}

## 初步分析结果
{initial_analysis}

## 该通信对的历史记录
{memory_block}

请提供更精确的威胁评估和详细的安全建议。输出格式和初步分析相同（JSON），必须返回以下结构的JSON，必须使用中文：
{{
  "summary": "完善的日志概述：谁(主机名/IP):端口 → 谁(主机名/IP):端口；什么协议，什么行为。≤150字",
  "threat_level": "无危|低|中|高|严重",
  "security_hint": "该事件的安全含义，≤80字",
  "recommendation": "建议措施，≤100字"
}}

注意：
- 如果初步分析的判断有误（过高或过低），请在你的分析中明确纠正
- 结合通信对历史记录进行关联分析，识别可能的攻击模式或持续性威胁
- 你的判断将用于最终威胁等级确定，请务必准确"""

# ---------------------------------------------------------------------------
# Memory Compaction — Rolling summary merge (Improvement 30.8)
# ---------------------------------------------------------------------------
[memory_compact]
template = """你是一个网络安全运维日志分析助手。请将以下 {entry_count} 条关于同一通信对的历史分析记录压缩为一段简洁的综合摘要。

要求：
1. 保留关键时间节点和事件类型
2. 保留威胁演变趋势（是否升级/降级/持续）
3. 保留因果关系和关联线索
4. 去除重复和冗余描述
5. 总长度控制在 300 字以内

通信对：{pair_key}

历史记录：
{entries_text}

请直接输出压缩后的摘要，不要添加任何前缀或解释："""
