# [llm]
# API key for remote LLM backends (OpenAI, Azure OpenAI, vLLM with auth).
# Written to credentials.db as llm_api_key. Can also be set via
# SURICATA_LLM_API_KEY env var or managed at runtime via PUT /credentials/llm_api_key.
# api_key = { "value" = "CHANGE_ME" }

# [mail]
# client_id and client_secret are written to credentials.db by the deploy script.
# The runtime loads them from the database, not from this file.
# Uncomment for non-container / development use without credentials.db:
# client_id = { "value" = "CHANGE_ME" }
# client_secret = { "value" = "CHANGE_ME" }
